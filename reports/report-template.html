<!--
  Ex Nihilo Report Template
  Remote agents should use this as a reference for report HTML structure.
  Replace {TITLE}, {DATE}, {PIPELINE}, {COLOUR}, and {CONTENT} placeholders.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{TITLE} - {DATE}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e17;
    color: #c8d6e5;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    line-height: 1.6;
    padding: 2rem;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  .back { display: inline-block; margin-bottom: 1.5rem; color: #5a7a94; text-decoration: none; }
  .back:hover { color: #00d4ff; }
  h1 { color: #00d4ff; font-size: 2rem; margin-bottom: 0.3rem; }
  .report-meta { color: #5a7a94; font-size: 0.9rem; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #1e2d3d; }
  .report-meta .pipeline-badge {
    display: inline-block;
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    font-size: 0.8rem;
    font-weight: 600;
    background: {COLOUR}22;
    color: {COLOUR};
    margin-right: 0.5rem;
  }
  h2 {
    color: #5ce0d8;
    font-size: 1.4rem;
    margin: 2.5rem 0 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid #1e2d3d;
  }
  h3 { color: #a8c4db; font-size: 1.1rem; margin: 1.5rem 0 0.5rem; }
  .section {
    background: #111827;
    border-radius: 8px;
    padding: 1.5rem;
    margin: 1rem 0;
    border: 1px solid #1e2d3d;
  }
  .status-pass { color: #10b981; font-weight: 600; }
  .status-fail { color: #ef4444; font-weight: 600; }
  .status-warn { color: #f59e0b; font-weight: 600; }
  .status-info { color: #3b82f6; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
  th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #1e2d3d; }
  th { color: #5ce0d8; font-weight: 600; }
  code { background: #1a2332; padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.9em; }
  pre { background: #1a2332; padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 1rem 0; }
  pre code { padding: 0; background: none; }
  ul, ol { padding-left: 1.5rem; margin: 0.5rem 0; }
  li { margin: 0.3rem 0; }
  .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.8rem; font-weight: 600; }
  .badge-critical { background: #7f1d1d; color: #fca5a5; }
  .badge-high { background: #7f1d1d; color: #fca5a5; }
  .badge-medium { background: #78350f; color: #fcd34d; }
  .badge-low { background: #064e3b; color: #6ee7b7; }
  .badge-info { background: #1e3a5f; color: #93c5fd; }
  .summary-box {
    background: linear-gradient(135deg, #0f1729, #1a1f3a);
    border: 1px solid #1e2d3d;
    border-radius: 8px;
    padding: 1.5rem;
    margin: 1rem 0;
  }
  .summary-box h3 { margin-top: 0; }
  .metric {
    display: inline-block;
    text-align: center;
    padding: 1rem 1.5rem;
    background: #0d1117;
    border-radius: 8px;
    margin: 0.5rem;
    min-width: 120px;
  }
  .metric .value { font-size: 2rem; font-weight: 700; color: #00d4ff; display: block; }
  .metric .label { font-size: 0.8rem; color: #5a7a94; }
  .footer {
    margin-top: 3rem;
    padding-top: 1rem;
    border-top: 1px solid #1e2d3d;
    color: #3a4a5a;
    font-size: 0.8rem;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <a class="back" href="/">&larr; Back to Dashboard</a>
  <h1>{TITLE}</h1>
  <div class="report-meta">
    <span class="pipeline-badge">{PIPELINE}</span>
    Generated: {DATE} &mdash; Ex Nihilo by Meridian Logic Ltd
  </div>

  <!-- Report content goes here -->
  {CONTENT}

  <div class="footer">
    Generated by Claude Code Scheduled Pipeline &mdash; Meridian Logic Ltd
  </div>
</div>
</body>
</html>
